<svg width="900" height="1200" viewBox="0 0 900 1200" xmlns="http://www.w3.org/2000/svg" fill="none">
<rect width="900" height="1200" fill="#F8FAFC"/>
<text x="450" y="70" text-anchor="middle" fill="#0F172A" font-size="40" font-weight="800">시니어앤라이프 돌봄 흐름</text>
<text x="450" y="108" text-anchor="middle" fill="#475569" font-size="23">관찰 기록이 위험 신호 대응으로 이어지는 구조</text>
<rect x="90" y="170" width="720" height="150" rx="20" fill="#FFFFFF" stroke="#86EFAC"/>
<text x="450" y="230" text-anchor="middle" fill="#166534" font-size="30" font-weight="700">1. 생활 관찰</text>
<text x="450" y="272" text-anchor="middle" fill="#334155" font-size="22">수면·활동·복약·행동 기록</text>
<text x="450" y="370" text-anchor="middle" fill="#64748B" font-size="36">↓</text>
<rect x="90" y="400" width="720" height="150" rx="20" fill="#FFFFFF" stroke="#86EFAC"/>
<text x="450" y="460" text-anchor="middle" fill="#166534" font-size="30" font-weight="700">2. 위험 신호 분석</text>
<text x="450" y="502" text-anchor="middle" fill="#334155" font-size="22">이상 패턴 탐지와 우선 대응 알림</text>
<text x="450" y="600" text-anchor="middle" fill="#64748B" font-size="36">↓</text>
<rect x="90" y="630" width="720" height="150" rx="20" fill="#FFFFFF" stroke="#86EFAC"/>
<text x="450" y="690" text-anchor="middle" fill="#166534" font-size="30" font-weight="700">3. 케어 실행</text>
<text x="450" y="732" text-anchor="middle" fill="#334155" font-size="22">가족·요양보호사·기관 협업</text>
<text x="450" y="830" text-anchor="middle" fill="#64748B" font-size="36">↓</text>
<rect x="90" y="860" width="720" height="220" rx="22" fill="#ECFDF5" stroke="#BBF7D0"/>
<text x="450" y="930" text-anchor="middle" fill="#166534" font-size="30" font-weight="700">4. 리포트 환류</text>
<text x="450" y="975" text-anchor="middle" fill="#334155" font-size="22">돌봄 품질 점검·정서 지원·운영 개선</text>
<text x="450" y="1020" text-anchor="middle" fill="#334155" font-size="22">다음 주기 계획에 반영</text>
</svg>