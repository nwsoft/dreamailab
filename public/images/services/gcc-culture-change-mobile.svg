<svg width="900" height="1360" viewBox="0 0 900 1360" xmlns="http://www.w3.org/2000/svg" fill="none">
<rect width="900" height="1360" fill="#F8FAFC"/>
<text x="450" y="72" text-anchor="middle" fill="#0F172A" font-size="40" font-weight="800">국제결혼 문화 전환</text>
<text x="450" y="110" text-anchor="middle" fill="#475569" font-size="23">기존 관행을 표준·투명·윤리 구조로 개선</text>
<rect x="70" y="170" width="760" height="250" rx="22" fill="#FEF2F2" stroke="#FCA5A5"/>
<text x="450" y="225" text-anchor="middle" fill="#991B1B" font-size="30" font-weight="700">기존 문제</text>
<text x="110" y="285" fill="#7F1D1D" font-size="23">• 깜깜이 견적과 불명확한 비교 기준</text>
<text x="110" y="330" fill="#7F1D1D" font-size="23">• 차별/상품화 문구, 비윤리 광고</text>
<text x="110" y="375" fill="#7F1D1D" font-size="23">• 불명확한 금전 흐름과 분쟁 리스크</text>
<text x="450" y="485" text-anchor="middle" fill="#64748B" font-size="40">↓ 전환 ↓</text>
<rect x="70" y="540" width="760" height="350" rx="22" fill="#EFF6FF" stroke="#93C5FD"/>
<text x="450" y="600" text-anchor="middle" fill="#1D4ED8" font-size="30" font-weight="700">GCC 개선 방식</text>
<text x="110" y="665" fill="#1E3A8A" font-size="23">• 국가/케이스별 표준 견적 항목 공개</text>
<text x="110" y="710" fill="#1E3A8A" font-size="23">• 윤리 가이드와 검수 기준 운영</text>
<text x="110" y="755" fill="#1E3A8A" font-size="23">• 책임 주체가 보이는 투명 정산 구조</text>
<text x="110" y="800" fill="#1E3A8A" font-size="23">• 충분한 정보·상담 기반의 책임 매칭</text>
<rect x="70" y="940" width="760" height="300" rx="22" fill="#FFFFFF" stroke="#E2E8F0"/>
<text x="450" y="1000" text-anchor="middle" fill="#0F172A" font-size="30" font-weight="700">기대 임팩트</text>
<text x="110" y="1065" fill="#334155" font-size="23">• 사용자의 비교 가능성·의사결정 신뢰도 향상</text>
<text x="110" y="1110" fill="#334155" font-size="23">• 파트너 간 품질 경쟁과 시장 자정 유도</text>
<text x="110" y="1155" fill="#334155" font-size="23">• 결혼 전·후 정착 지원의 연속성 강화</text>
</svg>