<svg width="960" height="320" viewBox="0 0 960 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cmpbg" x1="0" y1="0" x2="960" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
  </defs>
  <rect width="960" height="320" fill="url(#cmpbg)"/>
  <text x="480" y="40" text-anchor="middle" fill="#0F172A" font-size="20" font-family="system-ui, sans-serif" font-weight="700">Position: add-on tools vs infra engine</text>
  <rect x="48" y="72" width="400" height="200" rx="14" fill="#FEF2F2" stroke="#FECACA" stroke-width="2"/>
  <text x="248" y="108" text-anchor="middle" fill="#991B1B" font-size="14" font-family="system-ui, sans-serif" font-weight="700">Typical stack</text>
  <text x="248" y="138" text-anchor="middle" fill="#7F1D1D" font-size="12" font-family="system-ui, sans-serif">Tutoring apps, chat AI, silo LMS</text>
  <text x="248" y="168" text-anchor="middle" fill="#7F1D1D" font-size="12" font-family="system-ui, sans-serif">Session-only or admin-only data</text>
  <text x="248" y="198" text-anchor="middle" fill="#7F1D1D" font-size="12" font-family="system-ui, sans-serif">Analysis stops before weekly routine</text>
  <text x="248" y="248" text-anchor="middle" fill="#991B1B" font-size="11" font-family="system-ui, sans-serif">Hard to compare across schools</text>
  <rect x="512" y="72" width="400" height="200" rx="14" fill="#EEF2FF" stroke="#A5B4FC" stroke-width="2"/>
  <text x="712" y="108" text-anchor="middle" fill="#312E81" font-size="14" font-family="system-ui, sans-serif" font-weight="700">EduCareLog</text>
  <text x="712" y="138" text-anchor="middle" fill="#3730A3" font-size="12" font-family="system-ui, sans-serif">One schema: home, academy, school</text>
  <text x="712" y="168" text-anchor="middle" fill="#3730A3" font-size="12" font-family="system-ui, sans-serif">Collect - analyze - path - execute - feedback</text>
  <text x="712" y="198" text-anchor="middle" fill="#3730A3" font-size="12" font-family="system-ui, sans-serif">Drafts reviewed by teachers before send</text>
  <text x="712" y="248" text-anchor="middle" fill="#312E81" font-size="11" font-family="system-ui, sans-serif">DAL education axis (same care-log pattern)</text>
</svg>
