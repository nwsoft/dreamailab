<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="620" fill="#F8FAFC"/>
  <text x="600" y="56" text-anchor="middle" font-size="30" font-weight="700" fill="#0F172A">국제결혼 시장 문화 전환</text>
  <text x="600" y="88" text-anchor="middle" font-size="16" fill="#334155">기존 문제 관행을 투명·표준·책임 기반 구조로 전환</text>
  <rect x="50" y="130" width="530" height="420" rx="20" fill="#FEF2F2" stroke="#FCA5A5"/>
  <text x="315" y="170" text-anchor="middle" font-size="24" font-weight="700" fill="#991B1B">기존 관행 (문제)</text>
  <rect x="80" y="195" width="470" height="75" rx="12" fill="#FFFFFF"/>
  <text x="98" y="225" font-size="17" font-weight="600" fill="#7F1D1D">1) 깜깜이 견적</text>
  <text x="98" y="249" font-size="14" fill="#7F1D1D">상담 후 안내 방식으로 비교 기준이 불명확함</text>
  <rect x="80" y="285" width="470" height="75" rx="12" fill="#FFFFFF"/>
  <text x="98" y="315" font-size="17" font-weight="600" fill="#7F1D1D">2) 차별/상품화 문구</text>
  <text x="98" y="339" font-size="14" fill="#7F1D1D">인권 침해 소지가 있는 홍보 문구와 관행</text>
  <rect x="80" y="375" width="470" height="75" rx="12" fill="#FFFFFF"/>
  <text x="98" y="405" font-size="17" font-weight="600" fill="#7F1D1D">3) 불명확한 금전 흐름</text>
  <text x="98" y="429" font-size="14" fill="#7F1D1D">직접 송금 강요, 브로커 개입 등 분쟁 위험</text>
  <rect x="80" y="465" width="470" height="75" rx="12" fill="#FFFFFF"/>
  <text x="98" y="495" font-size="17" font-weight="600" fill="#7F1D1D">4) 성급한 의사결정</text>
  <text x="98" y="519" font-size="14" fill="#7F1D1D">사전 정보/상담 부족으로 단기 판단 유도</text>
  <rect x="620" y="130" width="530" height="420" rx="20" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="885" y="170" text-anchor="middle" font-size="24" font-weight="700" fill="#1D4ED8">GCC 전환 방식</text>
  <rect x="650" y="195" width="470" height="75" rx="12" fill="#FFFFFF"/>
  <text x="668" y="225" font-size="17" font-weight="600" fill="#1E3A8A">1) 표준 견적 공개</text>
  <text x="668" y="249" font-size="14" fill="#1E3A8A">국가/케이스별 비용 항목을 같은 형식으로 공개</text>
  <rect x="650" y="285" width="470" height="75" rx="12" fill="#FFFFFF"/>
  <text x="668" y="315" font-size="17" font-weight="600" fill="#1E3A8A">2) 윤리 가이드 운영</text>
  <text x="668" y="339" font-size="14" fill="#1E3A8A">차별/비하 문구 금지, 인권 중심 검수 기준 적용</text>
  <rect x="650" y="375" width="470" height="75" rx="12" fill="#FFFFFF"/>
  <text x="668" y="405" font-size="17" font-weight="600" fill="#1E3A8A">3) 투명 정산 구조</text>
  <text x="668" y="429" font-size="14" fill="#1E3A8A">비용 항목·책임 주체 명시로 분쟁 가능성 완화</text>
  <rect x="650" y="465" width="470" height="75" rx="12" fill="#FFFFFF"/>
  <text x="668" y="495" font-size="17" font-weight="600" fill="#1E3A8A">4) 책임 매칭 프로세스</text>
  <text x="668" y="519" font-size="14" fill="#1E3A8A">충분한 안내·상담·체크리스트 기반 의사결정</text>
  <path d="M585 230H615" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M607 222L615 230L607 238" stroke="#64748B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M585 320H615" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M607 312L615 320L607 328" stroke="#64748B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M585 410H615" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M607 402L615 410L607 418" stroke="#64748B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M585 500H615" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M607 492L615 500L607 508" stroke="#64748B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
