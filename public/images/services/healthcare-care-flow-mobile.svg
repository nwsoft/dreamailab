<svg width="900" height="1320" viewBox="0 0 900 1320" xmlns="http://www.w3.org/2000/svg" fill="none">
<rect width="900" height="1320" fill="#F8FAFC"/>
<text x="450" y="72" text-anchor="middle" fill="#0F172A" font-size="40" font-weight="800">토탈케어로그 운영 흐름</text>
<text x="450" y="110" text-anchor="middle" fill="#475569" font-size="23">기록 → 표준화 → AI 분석 → 권고 → 연계</text>
<g font-size="28" font-weight="700" text-anchor="middle">
<rect x="130" y="170" width="640" height="120" rx="20" fill="#FFFFFF" stroke="#A5F3FC"/><text x="450" y="245" fill="#0E7490">1. 일상 기록</text>
<text x="450" y="350" fill="#64748B" font-size="38">↓</text>
<rect x="130" y="390" width="640" height="120" rx="20" fill="#FFFFFF" stroke="#A5F3FC"/><text x="450" y="465" fill="#0E7490">2. 표준화</text>
<text x="450" y="570" fill="#64748B" font-size="38">↓</text>
<rect x="130" y="610" width="640" height="120" rx="20" fill="#FFFFFF" stroke="#67E8F9"/><text x="450" y="685" fill="#0E7490">3. AI 분석</text>
<text x="450" y="790" fill="#64748B" font-size="38">↓</text>
<rect x="130" y="830" width="640" height="120" rx="20" fill="#FFFFFF" stroke="#67E8F9"/><text x="450" y="905" fill="#0E7490">4. 맞춤 권고</text>
<text x="450" y="1010" fill="#64748B" font-size="38">↓</text>
<rect x="130" y="1050" width="640" height="120" rx="20" fill="#FFFFFF" stroke="#A5F3FC"/><text x="450" y="1125" fill="#0E7490">5. 의료 연계</text>
</g>
<text x="450" y="1245" text-anchor="middle" fill="#334155" font-size="23">같은 데이터 기준으로 환자·가족·의료진 협업 강화</text>
</svg>