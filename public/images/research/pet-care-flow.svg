<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="420" rx="24" fill="#F8FBFF"/>
  <text x="600" y="42" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="24" font-weight="800" fill="#1E3A8A">Pet Care Log - 일상 케어 흐름</text>
  <text x="600" y="70" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#64748B">관찰 -&gt; 기록 -&gt; 해석 -&gt; 리포트 -&gt; 추천 -&gt; 환류</text>
  <g font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">
    <rect x="40" y="120" width="160" height="180" rx="16" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
    <text x="120" y="170" text-anchor="middle" font-size="15" font-weight="700" fill="#1D4ED8">01 관찰</text>
    <text x="120" y="205" text-anchor="middle" font-size="12" fill="#475569">카메라/센서</text>
    <text x="120" y="230" text-anchor="middle" font-size="12" fill="#475569">보호자 입력</text>
    <text x="120" y="255" text-anchor="middle" font-size="12" fill="#475569">활동/식사/수면</text>
    <text x="210" y="210" font-size="22" fill="#94A3B8">&gt;</text>

    <rect x="240" y="120" width="160" height="180" rx="16" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
    <text x="320" y="170" text-anchor="middle" font-size="15" font-weight="700" fill="#1D4ED8">02 기록</text>
    <text x="320" y="205" text-anchor="middle" font-size="12" fill="#475569">Digital Care Log</text>
    <text x="320" y="230" text-anchor="middle" font-size="12" fill="#475569">타임라인 누적</text>
    <text x="320" y="255" text-anchor="middle" font-size="12" fill="#475569">하루~평생</text>
    <text x="410" y="210" font-size="22" fill="#94A3B8">&gt;</text>

    <rect x="440" y="120" width="160" height="180" rx="16" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="2"/>
    <text x="520" y="170" text-anchor="middle" font-size="15" font-weight="700" fill="#5B21B6">03 해석</text>
    <text x="520" y="205" text-anchor="middle" font-size="12" fill="#475569">Behavior AI</text>
    <text x="520" y="230" text-anchor="middle" font-size="12" fill="#475569">이상 탐지</text>
    <text x="520" y="255" text-anchor="middle" font-size="12" fill="#475569">건강 신호</text>
    <text x="610" y="210" font-size="22" fill="#94A3B8">&gt;</text>

    <rect x="640" y="120" width="160" height="180" rx="16" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="2"/>
    <text x="720" y="170" text-anchor="middle" font-size="15" font-weight="700" fill="#5B21B6">04 리포트</text>
    <text x="720" y="205" text-anchor="middle" font-size="12" fill="#475569">일일 AI 일지</text>
    <text x="720" y="230" text-anchor="middle" font-size="12" fill="#475569">주간/월간 요약</text>
    <text x="720" y="255" text-anchor="middle" font-size="12" fill="#475569">병원용 리포트</text>
    <text x="810" y="210" font-size="22" fill="#94A3B8">&gt;</text>

    <rect x="840" y="120" width="160" height="180" rx="16" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="2"/>
    <text x="920" y="170" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">05 추천</text>
    <text x="920" y="205" text-anchor="middle" font-size="12" fill="#475569">산책/운동</text>
    <text x="920" y="230" text-anchor="middle" font-size="12" fill="#475569">사료/환경</text>
    <text x="920" y="255" text-anchor="middle" font-size="12" fill="#475569">행동 교정</text>
    <text x="1010" y="210" font-size="22" fill="#94A3B8">&gt;</text>

    <rect x="1040" y="120" width="130" height="180" rx="16" fill="#4F46E5"/>
    <text x="1105" y="170" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">06 환류</text>
    <text x="1105" y="205" text-anchor="middle" font-size="12" fill="#E0E7FF">실행 결과</text>
    <text x="1105" y="230" text-anchor="middle" font-size="12" fill="#E0E7FF">재학습</text>
    <text x="1105" y="255" text-anchor="middle" font-size="12" fill="#E0E7FF">개인화</text>
  </g>
  <text x="600" y="360" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="12" fill="#64748B">자람이 Care Loop와 동일한 기록-분석-실행-환류 구조를 Pet 도메인에 확장</text>
  <text x="600" y="390" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="11" fill="#94A3B8">Research / Technology Development - 상용 운영 아님</text>
</svg>
