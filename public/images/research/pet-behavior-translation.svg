  <text x="210" y="255" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#475569">왜 계속 핥는가</text>
  <text x="210" y="285" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#475569">왜 산책을 거부하는가</text>
  <text x="210" y="315" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#475569">왜 잠이 늘었는가</text>
  <text x="210" y="345" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#475569">왜 갑자기 공격적인가</text>

  <text x="420" y="270" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="28" fill="#A78BFA">&gt;</text>

  <rect x="460" y="110" width="280" height="320" rx="16" fill="#5B21B6"/>
  <text x="600" y="170" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">AI 종합 해석</text>
  <text x="600" y="220" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#E9D5FF">행동 + 환경</text>
  <text x="600" y="250" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#E9D5FF">+ 과거 로그</text>
  <text x="600" y="280" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#E9D5FF">+ 감정 추정</text>
  <text x="600" y="330" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="12" fill="#C4B5FD">자람이 Behavior 기술 확장</text>

  <text x="780" y="270" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="28" fill="#A78BFA">&gt;</text>

  <rect x="820" y="110" width="340" height="320" rx="16" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2"/>
  <text x="990" y="150" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="15" font-weight="700" fill="#5B21B6">보호자 설명 + 코칭</text>
  <text x="990" y="200" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#475569">원인 가설 설명</text>
  <text x="990" y="230" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#475569">행동 교정 제안</text>
  <text x="990" y="260" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#475569">놀이 / 훈련 / 보상</text>
