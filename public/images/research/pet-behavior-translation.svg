<svg width="1200" height="500" viewBox="0 0 1200 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="500" rx="24" fill="#FAF5FF"/>
  <text x="600" y="40" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="22" font-weight="800" fill="#5B21B6">Behavior Translation AI</text>
  <text x="600" y="68" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#7C3AED">왜? 를 보호자 언어로 설명하는 엔진</text>

  <rect x="40" y="110" width="340" height="320" rx="16" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2"/>
  <text x="210" y="150" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="15" font-weight="700" fill="#5B21B6">관찰된 행동</text>
  <text x="210" y="195" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#475569">왜 계속 짖는가</text>
