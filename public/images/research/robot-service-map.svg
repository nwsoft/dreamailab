<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="640" rx="24" fill="#0F172A"/>
  <text x="600" y="42" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="24" font-weight="800" fill="#F8FAFC">DAL Services x Robot Vision</text>
  <text x="600" y="70" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#94A3B8">현재 서비스 축이 로봇에 어떻게 연결되는지 - Research 개념도</text>

  <rect x="420" y="100" width="360" height="80" rx="16" fill="#4F46E5"/>
  <text x="600" y="135" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">AI Digital Care Log</text>
  <text x="600" y="160" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="12" fill="#E0E7FF">관찰 / 기록 / 분석 / 예측 / 판단</text>

  <rect x="420" y="220" width="360" height="70" rx="14" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
  <text x="600" y="250" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="15" font-weight="700" fill="#FCD34D">Robot AI Brain</text>
  <text x="600" y="272" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="12" fill="#FDE68A">행동 결정 / 실행 지시 / 학습 환류</text>

  <line x1="600" y1="180" x2="600" y2="220" stroke="#64748B" stroke-width="2"/>

  <!-- service cards -->
  <g font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif">
    <rect x="40" y="340" width="170" height="220" rx="14" fill="#1E293B" stroke="#60A5FA" stroke-width="2"/>
    <text x="125" y="375" text-anchor="middle" font-size="14" font-weight="700" fill="#93C5FD">자람이</text>
    <text x="125" y="410" text-anchor="middle" font-size="12" fill="#CBD5E1">행동/학습 로그</text>
    <text x="125" y="435" text-anchor="middle" font-size="12" fill="#CBD5E1">치료 루틴</text>
    <text x="125" y="480" text-anchor="middle" font-size="12" fill="#FCD34D">로봇 역할</text>
    <text x="125" y="505" text-anchor="middle" font-size="11" fill="#E2E8F0">학습 보조</text>
    <text x="125" y="525" text-anchor="middle" font-size="11" fill="#E2E8F0">루틴 리마인드</text>

    <rect x="230" y="340" width="170" height="220" rx="14" fill="#1E293B" stroke="#34D399" stroke-width="2"/>
    <text x="315" y="375" text-anchor="middle" font-size="14" font-weight="700" fill="#6EE7B7">시니어</text>
    <text x="315" y="410" text-anchor="middle" font-size="12" fill="#CBD5E1">돌봄/낙상 신호</text>
    <text x="315" y="435" text-anchor="middle" font-size="12" fill="#CBD5E1">복약/활력</text>
    <text x="315" y="480" text-anchor="middle" font-size="12" fill="#FCD34D">로봇 역할</text>
    <text x="315" y="505" text-anchor="middle" font-size="11" fill="#E2E8F0">순찰/알림</text>
    <text x="315" y="525" text-anchor="middle" font-size="11" fill="#E2E8F0">동행 보조</text>

    <rect x="420" y="340" width="170" height="220" rx="14" fill="#1E293B" stroke="#F472B6" stroke-width="2"/>
    <text x="505" y="375" text-anchor="middle" font-size="14" font-weight="700" fill="#F9A8D4">토탈케어</text>
    <text x="505" y="410" text-anchor="middle" font-size="12" fill="#CBD5E1">건강 로그</text>
    <text x="505" y="435" text-anchor="middle" font-size="12" fill="#CBD5E1">약물/증상</text>
    <text x="505" y="480" text-anchor="middle" font-size="12" fill="#FCD34D">로봇 역할</text>
    <text x="505" y="505" text-anchor="middle" font-size="11" fill="#E2E8F0">측정 보조</text>
    <text x="505" y="525" text-anchor="middle" font-size="11" fill="#E2E8F0">리포트 전달</text>

    <rect x="610" y="340" width="170" height="220" rx="14" fill="#1E293B" stroke="#A78BFA" stroke-width="2"/>
    <text x="695" y="375" text-anchor="middle" font-size="14" font-weight="700" fill="#C4B5FD">에듀케어</text>
    <text x="695" y="410" text-anchor="middle" font-size="12" fill="#CBD5E1">학습 반응</text>
    <text x="695" y="435" text-anchor="middle" font-size="12" fill="#CBD5E1">맞춤 경로</text>
    <text x="695" y="480" text-anchor="middle" font-size="12" fill="#FCD34D">로봇 역할</text>
    <text x="695" y="505" text-anchor="middle" font-size="11" fill="#E2E8F0">튜터링</text>
    <text x="695" y="525" text-anchor="middle" font-size="11" fill="#E2E8F0">집중 코칭</text>

    <rect x="800" y="340" width="170" height="220" rx="14" fill="#1E293B" stroke="#FBBF24" stroke-width="2"/>
    <text x="885" y="375" text-anchor="middle" font-size="14" font-weight="700" fill="#FCD34D">베지케어</text>
    <text x="885" y="410" text-anchor="middle" font-size="12" fill="#CBD5E1">식습관 로그</text>
    <text x="885" y="435" text-anchor="middle" font-size="12" fill="#CBD5E1">영양 목표</text>
    <text x="885" y="480" text-anchor="middle" font-size="12" fill="#FCD34D">로봇 역할</text>
    <text x="885" y="505" text-anchor="middle" font-size="11" fill="#E2E8F0">식사 리마인드</text>
    <text x="885" y="525" text-anchor="middle" font-size="11" fill="#E2E8F0">환경 안내</text>

    <rect x="990" y="340" width="170" height="220" rx="14" fill="#1E293B" stroke="#FB7185" stroke-width="2"/>
    <text x="1075" y="375" text-anchor="middle" font-size="14" font-weight="700" fill="#FDA4AF">Pet AI</text>
    <text x="1075" y="410" text-anchor="middle" font-size="12" fill="#CBD5E1">행동 관찰</text>
    <text x="1075" y="435" text-anchor="middle" font-size="12" fill="#CBD5E1">케어 로그</text>
    <text x="1075" y="480" text-anchor="middle" font-size="12" fill="#FCD34D">로봇 역할</text>
    <text x="1075" y="505" text-anchor="middle" font-size="11" fill="#E2E8F0">펫 돌봄</text>
    <text x="1075" y="525" text-anchor="middle" font-size="11" fill="#E2E8F0">이상 대응</text>
