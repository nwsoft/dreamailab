  <text x="600" y="610" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="12" fill="#64748B">로봇은 행동 주체, Care Log는 관찰-판단-학습 코어 - Research / Future Vision</text>
</svg>
