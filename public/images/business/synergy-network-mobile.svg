  <text x="112" y="1094" font-size="15" font-weight="700" fill="#334155">4) 생애주기: 요람에서 무덤까지 AI디지털케어로그 지향</text>
  <text x="112" y="1127" font-size="15" font-weight="700" fill="#334155">5) 실행 구조: 파트너 허브에서 매칭·실행·환류 루프 운영</text>

  <rect x="90" y="1224" width="620" height="34" rx="17" fill="#E0E7FF"/>
  <text x="400" y="1246" text-anchor="middle" font-size="14" font-weight="700" fill="#3730A3">AI디지털케어로그: 기록 표준화 → 분석 → 추천·매칭 → 실행·환류</text>
